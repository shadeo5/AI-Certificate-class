# File: .github/workflows/plan-gate.yml
name: Plan Gate

on:
  pull_request:
    branches: [ main ]

# Least privilege: this workflow only needs to read repo contents.
# Overrides any repo/org default that would grant the token write access.
permissions:
  contents: read

jobs:
  require-plan:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA (supply-chain hardening) — tags are mutable, SHAs are not.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Require plan artifact
        run: |
          if [ ! -f ".github/pull_request_template.md" ]; then
            echo ".github/pull_request_template.md is required for this pull request."
            exit 1
          fi
          echo ".github/pull_request_template.md found."
